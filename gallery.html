    <style>
        /* ── Base ── */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .editorial-spacing {
            letter-spacing: -0.02em;
        }

        /* ── Entry Screens ── */
        .entry-screen {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: #fcf9f8;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        html.dark .entry-screen {
            background: #121111;
        }

        .entry-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .entry-screen.hidden-modal {
            opacity: 0;
            pointer-events: none;
        }

        /* Input styling */
        #pin-input {
            letter-spacing: 0.35em;
            font-size: 1.5rem;
            text-align: center;
            appearance: textfield;
        }

        #pin-input::-webkit-outer-spin-button,
        #pin-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ── Skeleton Loaders ── */
        @keyframes skeleton-pulse {
            0% {
                background-color: #e5e2e1;
            }

            50% {
                background-color: #f0eded;
            }

            100% {
                background-color: #e5e2e1;
            }
        }

        .skeleton-pulse {
            animation: skeleton-pulse 1.8s ease-in-out infinite;
        }

        .skeleton-grid {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .skeleton-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skeleton-item {
            border-radius: 4px;
            animation: skeleton-pulse 1.8s ease-in-out infinite;
        }

        /* ── Masonry Grid ── */
        #masonry-grid {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .masonry-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .masonry-item {
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #e5e2e1;
        }

        .masonry-item img {
            display: block;
            width: 100%;
            height: auto;
            transition: transform 0.45s ease, filter 0.3s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.04);
            filter: brightness(1.06);
        }

        .masonry-item .img-dl-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 2;
        }

        .masonry-item:hover .img-dl-btn {
            opacity: 1;
        }

        /* ── Lightbox ── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        #lightbox.is-open {
            opacity: 1;
            pointer-events: all;
        }

        #lightbox-img-wrap {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        #lightbox.is-open #lightbox-img-wrap {
            transform: scale(1);
        }

        #lightbox-img {
            transition: opacity 0.15s ease;
        }

        /* Desktop/tablet: enable transition */
        @media (min-width: 768px) {
            #lightbox-img {
                transition: opacity 0.15s ease;
            }
        }

        /* ── Shake ── */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-8px);
            }

            40%,
            80% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* Circular buttons */
        #lightbox-prev,
        #lightbox-next,
        #back-to-top,
        #lightbox-close,
        #lightbox-dl {
            border-radius: 50% !important;
        }

        #lightbox-prev span,
        #lightbox-next span,
        #back-to-top span {
            font-size: 28px;
            line-height: 1;
        }
    </style>
</head>

                    </a>

                <div class="flex flex-col items-center gap-1.5 text-center">
                    <span
                        class="text-[9px] tracking-[0.2em] font-bold text-[#1c1b1b]/40 dark:text-[#fcf9f8]/40 uppercase"
                        data-i18n="footer.label_youtube">YOUTUBE</span>
                    <a href="https://www.youtube.com/user/luttymoreira" target="_blank" rel="noopener noreferrer"
                        class="text-[12px] tracking-[0.1em] font-normal text-[#1c1b1b]/60 dark:text-[#fcf9f8]/60 hover:font-medium hover:text-error transition-all duration-300"
                        data-i18n="footer.value_youtube">
                        /luttymoreira
                    </a>
                </div>
            </div>
            <div class="font-inter text-[10px] tracking-widest uppercase text-[#1c1b1b]/40 dark:text-[#fcf9f8]/40"
                data-i18n="footer.copyright">
                © 2026 LUTTY MOREIRA PHOTO
            </div>
        </div>
    </footer>

    <!-- Back to top -->
    <button id="back-to-top"
        class="fixed bottom-6 right-6 z-50 w-14 h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary flex items-center justify-center shadow-lg hover:opacity-90 active:scale-95 transition-all opacity-0 pointer-events-none rounded-full">
        <span class="material-symbols-outlined text-2xl">keyboard_arrow_up</span>
    </button>

    <script>
            (function () {
                'use strict';

                // ── i18n ───────────────────────────────────────────────────────
                let translations = {};
                let currentLang = localStorage.getItem('lang') || 'en';

                function t(key) {
                    // First check gallery-specific translations (nested under gallery), then fall back to shared top-level translations
                    const langData = translations[currentLang] || {};

                    // Try the key as-is (for top-level translations like footer, nav, etc.)
                    let keys = key.split('.');
                    let val = langData;
                    for (const k of keys) {
                        val = val?.[k];
                    }

                    // If not found and key starts with entry/content/error, try under gallery prefix
                    const needsGalleryPrefix = key.startsWith('entry.') || key.startsWith('content.') || key.startsWith('error.');
                    if (val === undefined && needsGalleryPrefix) {
                        keys = ['gallery', ...key.split('.')];
                        val = langData;
                        for (const k of keys) {
                            val = val?.[k];
                        }
                    }

                    return val === undefined ? key : val;
                }

                function setLang(lang) {
                    currentLang = lang;
                    localStorage.setItem('lang', lang);
                    // Only update translations if translations have been loaded
                    if (Object.keys(translations).length > 0) {
                        updateTranslations();
                        updateDynamicTranslations();
                    }
                    // Update all language switcher labels
                    document.querySelectorAll('.lang-label').forEach(el => {
                        el.textContent = lang === 'en' ? 'ES' : 'EN';
                    });
                    // Update the header title if it exists
                    const headerTitle = document.getElementById('gallery-title-header');
                    if (headerTitle && galleryMeta && headerTitle.textContent === galleryMeta.title) {
                        // Keep the gallery title, but update if needed
                    }
                    // Note: Dynamic content (gallery title, photo count) comes from API and is not translated
                }

                function updateDynamicTranslations() {
                    // Update entry subtitle if it exists and has content
                    const entrySubtitleEl = document.getElementById('entry-subtitle');
                    if (entrySubtitleEl && !entrySubtitleEl.classList.contains('hidden')) {
                        if (galleryMeta) {
                            entrySubtitleEl.textContent = galleryMeta.requiresPin ? t('entry.enterPin') : t('entry.photosReady');
                        } else {
                            // Default fallback - try to detect from context
                            const pinSection = document.getElementById('pin-section');
                            const isPinMode = pinSection && !pinSection.classList.contains('hidden');
                            entrySubtitleEl.textContent = isPinMode ? t('entry.enterPin') : t('entry.photosReady');
                        }
                    }
                    // Update image count if visible
                    const imageCountEl = document.getElementById('image-count');
                    if (imageCountEl && images.length > 0) {
                        imageCountEl.textContent = `${images.length} ${images.length === 1 ? t('content.photo') : t('content.photos')}`;
                    }
                    // Update PIN error if visible
                    const pinErrorEl = document.getElementById('pin-error');
                    if (pinErrorEl && !pinErrorEl.classList.contains('hidden')) {
                        pinErrorEl.textContent = t('entry.pinError');
                    }
                }

                function updateTranslations() {
                    document.querySelectorAll('[data-i18n]').forEach(el => {
                        const key = el.getAttribute('data-i18n');
                        const trans = t(key);
                        if (trans && trans !== key) {
                            el.textContent = trans;
                        }
                    });
                }

                // Language switcher click handlers
                function setupLangSwitcher(id) {
                    const btn = document.getElementById(id);
                    if (btn) {
                        btn.onclick = () => {
                            setLang(currentLang === 'en' ? 'es' : 'en');
                        };
                    }
                }

                // Setup all language switchers
                setupLangSwitcher('lang-switch-gallery');
                setupLangSwitcher('mobile-lang-switch-entry');
                setupLangSwitcher('mobile-lang-switch-public');
                setupLangSwitcher('desktop-lang-switch-entry');
                setupLangSwitcher('desktop-lang-switch-public');

                // Initialize language switcher labels and translations
                document.querySelectorAll('.lang-label').forEach(el => {
                    el.textContent = currentLang === 'en' ? 'ES' : 'EN';
                });

                // Fetch translations from external JSON
                fetch('translations.json')
                    .then(response => response.json())
                    .then(data => {
                        translations = data;
                        updateTranslations();
                        updateDynamicTranslations();
                    })
                    .catch(err => {
                        console.error('Failed to load translations:', err);
                    });

                // ─── Dark Mode Toggle ─────────────────────────────────────────────────
                const themeToggleGallery = document.getElementById('theme-toggle-gallery');
                const mobileThemeToggleGallery = document.getElementById('mobile-theme-toggle-gallery');

                // Check for saved theme preference or use system preference
                function getPreferredTheme() {
                    const savedTheme = localStorage.getItem('theme');
                    if (savedTheme) return savedTheme;
                    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }

                // Apply theme
                function applyTheme(theme) {
                    if (theme === 'dark') {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                    localStorage.setItem('theme', theme);
                    updateThemeIconGallery(theme);
                }

                // Update toggle icon
                function updateThemeIconGallery(theme) {
                    if (themeToggleGallery) {
                        const icon = themeToggleGallery.querySelector('span');
                        icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
                    }
                    if (mobileThemeToggleGallery) {
                        const icon = mobileThemeToggleGallery.querySelector('span');
                        icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
                    }
                }

                // Initialize theme
                applyTheme(getPreferredTheme());

                // Toggle click handler
                function handleThemeToggleGallery() {
                    const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    applyTheme(newTheme);
                }

                if (themeToggleGallery) {
                    themeToggleGallery.addEventListener('click', handleThemeToggleGallery);
                }
                if (mobileThemeToggleGallery) {
                    mobileThemeToggleGallery.addEventListener('click', handleThemeToggleGallery);
                }

                // ── Parallel Initialization ─────────────────────────────────────
                const API_BASE = 'https://script.google.com/macros/s/AKfycbxw7wIRWBsQmhuzCxNvdNYPldONiXN8gH3fAva0fhiL2Z9AgIAqZgL-wQcc855LBYyLZw/exec';
                const params = new URLSearchParams(window.location.search);
                const gId = params.get('g');

                async function fetchAPI(action) {
                    const res = await fetch(`${API_BASE}?g=${encodeURIComponent(gId)}&action=${action}`, { credentials: 'omit' });
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error(json.message);
                    return json.gallery;
                }

                // ── State & Refs ────────────────────────────────────────────────
                let galleryMeta = null;
                let images = [];
                let currentIndex = 0;
                let metaPromise = null;
                let imagePromise = null;

                const entryGate = document.getElementById('entry-gate');
                const entryTitleSkel = document.getElementById('entry-title-skeleton');
                const entryTitleText = document.getElementById('entry-title-text');
                const entrySubtitle = document.getElementById('entry-subtitle');
                const entryTitleWrap = document.getElementById('entry-title-wrap');
                const entryActionWrap = document.getElementById('entry-action-wrap');
                const pinSection = document.getElementById('pin-section');
                const publicSection = document.getElementById('public-section');
                const header = document.getElementById('site-header');
                const galleryContent = document.getElementById('gallery-content');
                const skeletonState = document.getElementById('skeleton-state');
                const errorState = document.getElementById('error-state');

                // ── Session Storage Helpers ───────────────────────────────────────
                function saveGalleryState(meta, imgs, downloadZipUrl) {
                    try {
                        sessionStorage.setItem('galleryMeta', JSON.stringify(meta));
                        sessionStorage.setItem('galleryImages', JSON.stringify(imgs));
                        if (downloadZipUrl) {
                            sessionStorage.setItem('galleryDownloadZip', downloadZipUrl);
                        }
                    } catch (e) { /* ignore storage errors */ }
                }

                function loadGalleryState() {
                    try {
                        const metaStr = sessionStorage.getItem('galleryMeta');
                        const imgsStr = sessionStorage.getItem('galleryImages');
                        const downloadZip = sessionStorage.getItem('galleryDownloadZip');
                        if (metaStr && imgsStr) {
                            return {
                                meta: JSON.parse(metaStr),
                                images: JSON.parse(imgsStr),
                                downloadZipUrl: downloadZip || null
                            };
                        }
                    } catch (e) { /* ignore */ }
                    return null;
                }

                function clearGalleryState() {
                    try {
                        sessionStorage.removeItem('galleryMeta');
                        sessionStorage.removeItem('galleryImages');
                        sessionStorage.removeItem('galleryDownloadZip');
                    } catch (e) { /* ignore */ }
                }

                // Check if we have a stored session matching current gallery
                function hasStoredSession() {
                    const stored = loadGalleryState();
                    return stored && stored.meta && stored.images && stored.meta.id === gId;
                }

                // ── Instant Reveal from Session ───────────────────────────────────
                function revealGalleryDirect() {
                    // Hide entry gate immediately
                    entryGate.classList.add('hidden-modal');
                    entryGate.style.display = 'none';

                    // Get stored download URL
                    let downloadZipUrl = null;
                    try {
                        downloadZipUrl = sessionStorage.getItem('galleryDownloadZip');
                    } catch (e) { /* ignore */ }

                    // Setup gallery directly from stored data
                    document.getElementById('gallery-title').textContent = galleryMeta.title;
                    document.getElementById('gallery-title-header').textContent = galleryMeta.title;
                    document.getElementById('image-count').textContent = `${images.length} ${images.length === 1 ? t('content.photo') : t('content.photos')}`;

                    if (downloadZipUrl) {
                        const dlBtn = document.getElementById('download-all-btn');
                        dlBtn.classList.replace('hidden', 'flex');
                        dlBtn.onclick = () => window.open(downloadZipUrl, '_blank');
                    }

                    renderGrid();

                    // Show gallery immediately
                    header.classList.remove('opacity-0', 'pointer-events-none');
                    galleryContent.classList.remove('hidden');
                    setTimeout(() => {
                        galleryContent.classList.remove('translate-y-4', 'opacity-0');
                    }, 50);

                    document.getElementById('site-footer').classList.remove('hidden');
                    document.title = `${galleryMeta.title} · Lutty Moreira Photo`;

                    // Apply translations to dynamic content
                    document.getElementById('image-count').textContent = `${images.length} ${images.length === 1 ? t('content.photo') : t('content.photos')}`;
                    updateTranslations();
                }

                // ── Initialization ────────────────────────────────────────────────
                // If we have a valid stored session, skip the entry gate entirely
                if (gId && hasStoredSession()) {
                    const stored = loadGalleryState();
                    galleryMeta = stored.meta;
                    images = stored.images;
                    // Immediately show the gallery without the entry screen
                    revealGalleryDirect();
                } else {
                    // No stored session - clear any stale data and start fresh
                    clearGalleryState();

                    // Fire API calls immediately - title will show when metadata arrives
                    metaPromise = gId ? fetchAPI('metadata') : Promise.reject('No ID');
                    imagePromise = gId ? fetchAPI('images') : Promise.reject('No ID');

                    // Button click handler
                    document.getElementById('view-gallery-btn').onclick = () => {
                        revealGallery();
                    };

                    // ── Cycle 1: Metadata arrived ───────────────────────────────────
                    metaPromise.then(meta => {
                        galleryMeta = meta;
                        // Swap skeleton for text
                        entryTitleSkel.classList.add('hidden');
                        entryTitleText.textContent = meta.title || 'Your Gallery';
                        entryTitleText.classList.remove('hidden');
                        entrySubtitle.textContent = meta.requiresPin ? t('entry.enterPin') : t('entry.photosReady');
                        entrySubtitle.classList.remove('hidden');

                        // Now show the appropriate action (can't show button until we know if PIN required)
                        if (meta.requiresPin) {
                            pinSection.classList.replace('hidden', 'flex');
                            document.getElementById('pin-input').focus();
                        } else {
                            publicSection.classList.replace('hidden', 'flex');
                        }

                        entryActionWrap.classList.remove('opacity-0', 'pointer-events-none');
                    }).catch(err => {
                        entryGate.classList.add('hidden-modal');
                        errorState.classList.replace('hidden', 'flex');
                        document.getElementById('error-message').textContent = err || t('error.notFound');
                        updateTranslations();
                    });

                } // end else (no stored session)

                // ── Cycle 2: Trigger reveal ──────────────────────────────────────
                async function revealGallery() {
                    // Hide entry gate
                    entryGate.classList.add('hidden-modal');
                    setTimeout(() => entryGate.style.display = 'none', 450);

                    // Show skeleton grid immediately
                    skeletonState.classList.remove('hidden');
                    document.getElementById('skeleton-title').textContent = galleryMeta.title;
                    buildSkeletonGrid();
                    document.title = `${galleryMeta.title} · Lutty Moreira Photo`;

                    try {
                        // Use already-fetched images (parallel prefetch), don't fetch again
                        let imageData;
                        if (imagePromise && images.length === 0) {
                            imageData = await imagePromise;
                            images = imageData.images || [];
                        } else if (images.length > 0) {
                            imageData = { images: images };
                        } else {
                            imageData = await fetchAPI('images');
                            images = imageData.images || [];
                        }

                        // Save to session storage for instant reload on refresh
                        saveGalleryState(galleryMeta, images, imageData.downloadZipUrl || null);

                        // Setup gallery
                        document.getElementById('gallery-title').textContent = galleryMeta.title;
                        document.getElementById('gallery-title-header').textContent = galleryMeta.title;
                        document.getElementById('image-count').textContent = `${images.length} ${images.length === 1 ? t('content.photo') : t('content.photos')}`;
                        if (imageData.downloadZipUrl) {
                            const dlBtn = document.getElementById('download-all-btn');
                            dlBtn.classList.replace('hidden', 'flex');
                            dlBtn.onclick = () => window.open(imageData.downloadZipUrl, '_blank');
                        }

                        renderGrid();

                        // Smooth reveal
                        skeletonState.classList.add('hidden');
                        header.classList.remove('opacity-0', 'pointer-events-none');
                        galleryContent.classList.remove('hidden');
                        setTimeout(() => {
                            galleryContent.classList.remove('translate-y-4', 'opacity-0');
                        }, 50);

                        document.getElementById('site-footer').classList.remove('hidden');

                    } catch (err) {
                        console.error('Error loading photos:', err);
                        skeletonState.classList.add('hidden');
                        errorState.classList.replace('hidden', 'flex');
                        document.getElementById('error-message').textContent = err.message || t('error.notFound');
                        updateTranslations();
                    }
                }

                // ── Event Handlers ──────────────────────────────────────────────
                const pinIn = document.getElementById('pin-input');
                const pinBtn = document.getElementById('pin-submit');
                pinIn.oninput = () => pinBtn.disabled = pinIn.value.length < 4;
                pinIn.onkeydown = e => { if (e.key === 'Enter' && !pinBtn.disabled) checkPin(); };
                pinBtn.onclick = checkPin;

                function checkPin() {
                    if (String(pinIn.value) === String(galleryMeta.pin)) revealGallery();
                    else {
                        document.getElementById('pin-error').classList.remove('hidden');
                        document.getElementById('pin-form-wrap')?.classList.add('shake'); // check if wrapper exists
                        pinIn.classList.add('shake');
                        setTimeout(() => pinIn.classList.remove('shake'), 400);
                        pinIn.value = '';
                    }
                }

                // ── Helpers ─────────────────────────────────────────────────────
                function getNumCols() {
                    if (window.innerWidth >= 1024) return 4;
                    if (window.innerWidth >= 768) return 3;
                    return 2;
                }

                function buildSkeletonGrid() {
                    const grid = document.getElementById('skeleton-grid');
                    const num = getNumCols(); grid.innerHTML = '';
                    const heights = [200, 150, 300, 250, 180, 220];
                    const cols = Array.from({ length: num }, () => {
                        const c = document.createElement('div'); c.className = 'skeleton-col'; return c;
                    });
                    for (let i = 0; i < num * 4; i++) {
                        const item = document.createElement('div');
                        item.className = 'skeleton-item';
                        item.style.height = heights[i % 6] + 'px';
                        cols[i % num].appendChild(item);
                    }
                    cols.forEach(c => grid.appendChild(c));
                }

                function renderGrid() {
                    const num = getNumCols();
                    const cols = Array.from({ length: num }, () => {
                        const c = document.createElement('div'); c.className = 'masonry-col'; return c;
                    });
                    images.forEach((img, idx) => {
                        const item = document.createElement('div');
                        item.className = 'masonry-item';
                        item.onclick = () => openLightbox(idx);
                        const i = document.createElement('img'); i.src = img.url; i.loading = 'lazy';
                        const d = document.createElement('a'); d.className = 'img-dl-btn'; d.href = img.downloadUrl; d.download = img.name;
                        d.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">download</span>';
                        d.onclick = e => e.stopPropagation();
                        item.append(i, d);
                        cols[idx % num].appendChild(item);
                    });
                    const grid = document.getElementById('masonry-grid');
                    grid.innerHTML = '';
                    cols.forEach(c => grid.appendChild(c));
                }

                // ── Lightbox ────────────────────────────────────────────────────
                let lightboxImg = document.getElementById('lightbox-img');
                let touchStartX = 0;
                let touchEndX = 0;
                let overlaysVisible = true;
                let isLightboxOpen = false;
                let _handlingPop = false;

                function _pushState(state) {
                    if (!_handlingPop) history.pushState(state, '');
                }

                function openLightbox(i) {
                    currentIndex = i;
                    overlaysVisible = true;
                    renderLightbox();
                    document.getElementById('lightbox').classList.add('is-open');
                    document.body.style.overflow = 'hidden';
                    isLightboxOpen = true;
                    _pushState({ gallery: 'lightbox', index: i });
                }

                function closeLightbox() {
                    document.getElementById('lightbox').classList.remove('is-open');
                    document.body.style.overflow = '';
                    isLightboxOpen = false;
                }

                // Handle browser back button
                window.addEventListener('popstate', e => {
                    _handlingPop = true;
                    try {
                        if (isLightboxOpen) {
                            closeLightbox();
                        }
                    } finally {
                        _handlingPop = false;
                    }
                });

                function renderLightbox() {
                    const img = images[currentIndex];
                    const lb = document.getElementById('lightbox-img');
                    const isDesktop = window.innerWidth >= 768;

                    if (isDesktop) {
                        // Desktop: fade out, then swap image, then fade in
                        lb.style.opacity = '0';
                        setTimeout(() => {
                            lb.src = img.url;
                            // Wait for image to load before fading in
                            if (lb.complete) {
                                lb.style.opacity = '1';
                            } else {
                                lb.onload = () => { lb.style.opacity = '1'; };
                            }
                        }, 150); // Wait for fade-out to complete
                    } else {
                        // Mobile: quick toggle to prevent flash
                        lb.style.opacity = '0';
                        lb.onload = () => { lb.style.opacity = '1'; };
                        lb.src = img.url;
                    }

                    document.getElementById('lightbox-dl').href = img.downloadUrl;
                    document.getElementById('lightbox-counter').textContent = `${currentIndex + 1} / ${images.length}`;

                    // Always enable buttons for looping
                    document.getElementById('lightbox-prev').disabled = false;
                    document.getElementById('lightbox-next').disabled = false;

                    // Show overlays when switching images
                    overlaysVisible = true;
                    updateOverlays();
                }

                function updateOverlays() {
                    const overlays = document.querySelectorAll('#lightbox-close, #lightbox-dl, #lightbox-prev, #lightbox-next, #lightbox-counter');
                    overlays.forEach(el => {
                        el.style.opacity = overlaysVisible ? '1' : '0';
                        el.style.pointerEvents = overlaysVisible ? 'auto' : 'none';
                    });
                }

                // Toggle overlays on image click
                lightboxImg.addEventListener('click', (e) => {
                    e.stopPropagation();
                    overlaysVisible = !overlaysVisible;
                    updateOverlays();
                });

                // Touch swipe handling
                document.getElementById('lightbox').addEventListener('touchstart', e => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                document.getElementById('lightbox').addEventListener('touchend', e => {
                    touchEndX = e.changedTouches[0].screenX;
                    handleSwipe();
                }, { passive: true });

                function handleSwipe() {
                    const swipeThreshold = 50;
                    const diff = touchStartX - touchEndX;

                    if (Math.abs(diff) > swipeThreshold) {
                        if (diff > 0) {
                            // Swipe left - next (loop from last to first)
                            currentIndex = (currentIndex + 1) % images.length;
                            renderLightbox();
                        } else {
                            // Swipe right - previous (loop from first to last)
                            currentIndex = (currentIndex - 1 + images.length) % images.length;
                            renderLightbox();
                        }
                    }
                }

                document.getElementById('lightbox-close').onclick = closeLightbox;
                document.getElementById('lightbox-prev').onclick = () => {
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                    renderLightbox();
                };
                document.getElementById('lightbox-next').onclick = () => {
                    currentIndex = (currentIndex + 1) % images.length;
                    renderLightbox();
                };
                document.getElementById('lightbox').onclick = e => { if (e.target.id === 'lightbox') closeLightbox(); };

                window.addEventListener('keydown', e => {
                    if (!document.getElementById('lightbox').classList.contains('is-open')) return;
                    if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
                    if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
                    if (e.key === 'Escape') closeLightbox();
                });

                // ── Shuffle ─────────────────────────────────────────────────────
                document.getElementById('shuffle-btn').onclick = () => {
                    images.sort(() => Math.random() - 0.5);
                    renderGrid();
                };

                // ── Back to top ─────────────────────────────────────────────────
                const btt = document.getElementById('back-to-top');
                window.onscroll = () => {
                    if (window.scrollY > 400) btt.classList.remove('opacity-0', 'pointer-events-none');
                    else btt.classList.add('opacity-0', 'pointer-events-none');
                };
                btt.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            })();
    </script>
</body>
